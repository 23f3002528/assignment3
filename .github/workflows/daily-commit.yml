name: Daily Automated Commit - 23f3002528@ds.study.iitm.ac.in

on:
  schedule:
    - cron: '00 09 * * *'  # Runs daily at 09:00 UTC (specific time, not wildcard)
  workflow_dispatch:  # Allows manual triggering for testing

jobs:
  daily-commit:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository - 23f3002528@ds.study.iitm.ac.in
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
        
      - name: Create/Update timestamp file - 23f3002528@ds.study.iitm.ac.in
        run: |
          CURRENT_DATE=$(date +%Y-%m-%d)
          CURRENT_TIME=$(date +%H:%M:%S)
          echo "Last automated commit: $CURRENT_DATE at $CURRENT_TIME UTC" > .last-commit.txt
          
      - name: Commit and push changes - 23f3002528@ds.study.iitm.ac.in
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "actions@github.com"
          git add .last-commit.txt
          COMMIT_MSG="Daily automated commit by DevSync - $(date +%Y-%m-%d\ %H:%M:%S)"
          git commit -m "$COMMIT_MSG" || echo "No changes to commit"
          git push
